name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: .NET Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/Api.Tests/AttendanceApi.Tests.csproj

      - name: Build
        run: dotnet build src/Api.Tests/AttendanceApi.Tests.csproj --no-restore

      - name: Test
        run: dotnet test src/Api.Tests/AttendanceApi.Tests.csproj --no-build --verbosity normal

  build-web:
    name: React Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: src/Web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/Web

      - name: Build
        run: npm run build
        working-directory: src/Web
